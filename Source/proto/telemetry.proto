// telemetry.proto
//
// Wire format used between sensors and the telemetry server.
// Compile with: protoc --python_out=. proto/telemetry.proto
//
// TODO: Define the Reading and SensorRegistration messages.
//   At minimum, a Reading needs:
//     - sensor identifier
//     - reading type (e.g. temperature, humidity, soil_moisture, light)
//     - numeric value
//     - timestamp (Unix epoch seconds, or a google.protobuf.Timestamp)
//
//   Add any other messages your design requires.

syntax = "proto3";

package telemetry;

message Reading {
  string sensor_id = 1;
  int64 timestamp = 2;
  ReadingType reading_type = 3;
  float value = 4;
}

message SensorRegistration {
  string sensor_id = 1;
  string name = 2;
  string location = 3;
  repeated ReadingType reading_type = 4;
  int32 reporting_interval = 5;
  int64 registered_at = 6;
}

enum ReadingType {
  READING_TYPE_UNSPECIFIED = 0;
  TEMPERATURE = 1;
  HUMIDITY = 2;
  SOIL_MOISTURE = 3;
  LIGHT = 4;
  PRESSURE = 5;
}
